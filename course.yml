description: >-
  Pythonは汎用のプログラミング言語で、データサイエンス分野でますます人気が高まっています。世界中の企業が、データから洞察を得て競争優位性を高めるためにPythonを活用しています。本コースは他のPythonチュートリアルと異なり、データサイエンスに特化したPythonに焦点を当てています。Introduction
  to
  Pythonコースでは、データの強力な保存・操作方法や、分析を自分で始めるための便利なデータサイエンスツールを学びます。今すぐDataCampのオンラインPythonカリキュラムを始めましょう。


  動画にはライブトランスクリプトがあり、動画左下の"Show transcript"をクリックすると表示できます。


  コース用語集は、右側のリソースセクションにあります。


  CPEクレジットを取得するには、コースを完了し、認定評価で70%のスコアに到達する必要があります。右側のCPEクレジットの案内をクリックすると評価に移動できます。
